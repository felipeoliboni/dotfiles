services:
  simulador-do-caos:
    container_name: simulador-do-caos
    image: kubedevio/simulador-do-caos:v1
    ports:
      - "8080:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 30s