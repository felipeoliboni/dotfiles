services:
  kubenews:
      depends_on:
        - postgres
      container_name: kubenews
      image: foliboni/kubenews:${KUBENEWS_TAG:-latest}
      build:
        context: ./src
        dockerfile: Dockerfile
      ports:
        - 8080:8080
      environment:
        DB_HOST: postgres
        DB_USERNAME: ${POSTGRES_USER}
        DB_PASSWORD: ${POSTGRES_PASSWORD}
        DB_DATABASE: ${POSTGRES_DB}
      networks:
        - kubenews_net