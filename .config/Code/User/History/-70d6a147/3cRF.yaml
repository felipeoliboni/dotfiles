apiVersion: apps/v1
kind: Deployment
metadata:
  name: caotico
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caotico
  template:
    metadata:
      labels:
        app: caotico
    spec:
      containers:
      - name: caotico
        image: folibonis/caotico:v1
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: caotico
spec:
  selector:
    app: caotico
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    name: http
    protocol: TCP
    nodePort: 30000