apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversao
spec:
  replicas: 5
  selector:
    matchLabels:
      app: conversao
  template:
    metadata: 
      labels:
        app: conversao
    spec:
      containers:
        - name: conversao
          image: foliboni/conversao:v1
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
---
apiVersion: v1
kind: Service  
metadata:
  name: conversao-svc
spec:
  selector:
    app: conversao
  ports:
    - port: 3000
      targetPort: 80
      name: http
      protocol: TCP
  type: NodePort