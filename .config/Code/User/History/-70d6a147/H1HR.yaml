apiVersion: apps/v1
kind: Deployment
metadata:
  name: caotico
spec:
  replicas: 2
  selector:
    matchLabels:
      app: caotico
  template:
    metadata:
      labels:
        app: caotico
    spec:
      containers:
      - name: caotico
        image: kubedevio/simulador-do-caos:v1
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet: 
            port: 3000
            path: /ready
            httpHeaders:
            - name: token
              value: asdadfgshdsh
          initialDelaySeconds: 3
          periodSeconds: 4
          failureThreshold: 1
          successThreshold: 2
          timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: caotico
spec:
  selector:
    app: caotico
  type: NodePort
  ports:
  - port: 80
    targetPort: 3000
    name: http
    protocol: TCP
    nodePort: 30000