apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversao
spec:
  replicas: 5
  selector:
    matchLabels:
      app: web
  template:
    metadata: 
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: foliboni/conversao:v1
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
---
apiVersion: v1
kind: Service  
metadata:
  name: web-color
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 80
      name: http
      protocol: TCP
  type: NodePort