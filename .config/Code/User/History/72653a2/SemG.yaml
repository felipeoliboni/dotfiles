services:

  postgres:
    container_name: postgresql
    image: postgres:${POSTGRES_TAG}
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - kubenews_data:/var/lib/postgresql/data
    networks:
      - kubenews_net

  web:
    extends:
      file: ./kubenews.compose.yaml
      service: kubenews

volumes:
  kubenews_data:
    name: kubenews

networks:
  kubenews_net:
    name: kubenews_net
    driver: bridge