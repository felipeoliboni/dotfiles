services:
  kubenews:
    container_name: kubenews
    image: foliboni/kubenews:latest
    ports:
      - 8080:8080
    environment:
      DB_HOST: postgresql
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      DB_DATABASE: postgres
    networks:
      - kubenews
  postgres:
    container_name: postgresql
    image: postgres:12.17
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    volumes:
      - /home/felipe/postgres/data:/var/lib/postgresql/data
    networks:
      - kubenews