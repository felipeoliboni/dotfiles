services:
  kubenews:
    depends_on:
      - postgres
    container_name: kubenews
    image: foliboni/kubenews:${KUBENEWS_TAG}
    build:
      context: ./src
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      DB_DATABASE: postgres
    networks:
      - kubenews_net

  postgres:
    container_name: postgresql
    image: postgres:12.17
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    volumes:
      - kubenews_data:/var/lib/postgresql/data
    networks:
      - kubenews_net

volumes:
  kubenews_data:
    name: kubenews

networks:
  kubenews_net:
    name: kubenews_net
    driver: bridge