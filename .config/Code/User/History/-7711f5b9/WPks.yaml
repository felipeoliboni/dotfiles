apiVersion: v1 # Versão da API do Kubernetes
kind: Pod # Tipo do recurso
metadata: # Metadados do Pod
  name: meu-pod # Nome do Pod
spec: # Especificação do Pod
  containers: # Lista de containers
    - name: web # Nome do container
      image: nginx:latest # Imagem do container
      ports: # Lista de portas
        - containerPort: 80 # Porta que o container expõe
          # protocol: TCP # Protocolo da porta