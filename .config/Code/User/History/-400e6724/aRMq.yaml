services:
  
  kubenews:
      # depends_on:
      #   - postgres
      container_name: kubenews
      image: foliboni/kubenews:${KUBENEWS_TAG:-latest}
      build:
        context: ./src
        dockerfile: Dockerfile
      ports:
        - 8080:8080
      environment:
        DB_HOST: postgres
        DB_USERNAME: ${POSTGRES_USER}
        DB_PASSWORD: ${POSTGRES_PASSWORD}
        DB_DATABASE: ${POSTGRES_DB}
      networks:
        - kubenews_net

  postgres:
    container_name: postgresql
    image: postgres:${POSTGRES_TAG}
    ports:
      - 5432:5432
    # profiles:
    #   - dev
    #   - homolog
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - kubenews_data:/var/lib/postgresql/data
    networks:
      - kubenews_net



volumes:
  kubenews_data:
    name: kubenews

networks:
  kubenews_net:
    name: kubenews_net
    driver: bridge